name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone github-readme-stats
        run: git clone --depth 1 https://github.com/anuraghazra/github-readme-stats.git /tmp/grs

      - name: Install dependencies
        run: cd /tmp/grs && npm ci

      - name: Generate SVGs
        env:
          PAT_1: ${{ secrets.PAT_1 }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          cat > /tmp/generate.mjs << 'EOF'
          import { fetchStats } from '/tmp/grs/src/fetchers/stats.js';
          import { renderStatsCard } from '/tmp/grs/src/cards/stats.js';
          import { fetchTopLanguages } from '/tmp/grs/src/fetchers/top-languages.js';
          import { renderTopLanguages } from '/tmp/grs/src/cards/top-languages.js';
          import { writeFileSync } from 'fs';

          const workspace = process.env.WORKSPACE;

          const stats = await fetchStats('koga1694', true, []);
          const statsCard = renderStatsCard(stats, {
            show_icons: true,
            hide_border: true,
            count_private: true,
            include_all_commits: true,
          });
          writeFileSync(`${workspace}/github-stats.svg`, statsCard);

          const langs = await fetchTopLanguages('koga1694', [], 10);
          const langsCard = renderTopLanguages(langs, {
            layout: 'compact',
            hide_border: true,
          });
          writeFileSync(`${workspace}/top-langs.svg`, langsCard);

          console.log('SVGs generated successfully');
          EOF
          node /tmp/generate.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg top-langs.svg
          git diff --staged --quiet || (git commit -m "chore: update github stats" && git push)
